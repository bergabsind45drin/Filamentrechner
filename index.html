<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filament Rechner</title>

<style>
    :root{
        --bg:#0f1115;
        --card:#1b1f2a;
        --accent:#4caf50;
        --text:#e8e8e8;
        --muted:#a0a0a0;
    }

    *{
        box-sizing:border-box;
        font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        display:flex;
        justify-content:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:520px;
    }

    h1{
        font-size:22px;
        text-align:center;
        margin-bottom:16px;
    }

    .card{
        background:var(--card);
        border-radius:16px;
        padding:18px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    label{
        display:block;
        margin-top:12px;
        font-size:13px;
        color:var(--muted);
    }

    input, select{
        width:100%;
        padding:12px;
        margin-top:6px;
        border-radius:10px;
        border:1px solid #2c3345;
        background:#121621;
        color:var(--text);
        font-size:16px;
        outline:none;
    }

    input:focus, select:focus{
        border-color:var(--accent);
    }

    button{
        width:100%;
        margin-top:16px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:var(--accent);
        color:white;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
    }

    button:active{
        transform:scale(0.98);
    }

    .result{
        display:none;
    }
</style>
</head>

<body>

<div class="container">

    <h1>🧵 Filament Rechner</h1>

    <div class="card">

        <label>Innendurchmesser Hülse (cm)</label>
        <input id="inner" type="number" step="0.1">

        <label>Außendurchmesser Rolle (cm)</label>
        <input id="outer" type="number" step="0.1">

        <label>Rollenbreite (cm)</label>
        <input id="width" type="number" step="0.1">

        <label>Filamentdurchmesser</label>
        <select id="filament">
            <option value="1.75">1.75 mm</option>
            <option value="2.85">2.85 mm</option>
        </select>

        <label>Material</label>
        <select id="material">
            <option value="1.24">PLA</option>
            <option value="1.27">PETG</option>
        </select>

        <button onclick="calc()">Berechnen</button>

    </div>

</div>

<script>
function calc(){

    const inner = parseFloat(document.getElementById("inner").value);
    const outer = parseFloat(document.getElementById("outer").value);
    const width = parseFloat(document.getElementById("width").value);
    const filament = parseFloat(document.getElementById("filament").value);
    const density = parseFloat(document.getElementById("material").value);

    if(!inner || !outer || !width || !filament) return;

    const r1 = inner/2;
    const r2 = outer/2;

    const volume = Math.PI * (r2*r2 - r1*r1) * width;

    const mass = volume * density / 1000;

    const radiusF = (filament/10)/2;
    const areaF = Math.PI * radiusF * radiusF;

    const lengthCm = (mass*1000/density) / areaF;
    const meters = lengthCm / 100;

    alert(`📏 ${meters.toFixed(0)} Meter`);
}
</script>

</body>
</html>
