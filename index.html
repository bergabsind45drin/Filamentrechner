<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filament Rechner</title>

<style>
    :root{
        --bg:#0f1115;
        --card:#1b1f2a;
        --accent:#4caf50;
        --text:#e8e8e8;
        --muted:#a0a0a0;

        --highlight:#1f2a3a;
        --highlight-border:#3a4a66;
    }

    *{
        box-sizing:border-box;
        font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body{
        margin:0;
        background:var(--bg);
        color:var(--text);
        display:flex;
        justify-content:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:520px;
    }

    h1{
        font-size:22px;
        text-align:center;
        margin-bottom:16px;
    }

    .card{
        background:var(--card);
        border-radius:16px;
        padding:18px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    label{
        display:block;
        margin-top:12px;
        font-size:13px;
        color:var(--muted);
    }

    input, select{
        width:100%;
        padding:12px;
        margin-top:6px;
        border-radius:10px;
        border:1px solid #2c3345;
        background:#121621;
        color:var(--text);
        font-size:16px;
        outline:none;
    }

    input:focus, select:focus{
        border-color:var(--accent);
    }

    .highlight{
        background:var(--highlight) !important;
        border:1px solid var(--highlight-border) !important;
    }

    button{
        width:100%;
        margin-top:16px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:var(--accent);
        color:white;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
    }

    button:active{
        transform:scale(0.98);
    }

    .result{
        margin-top:16px;
        padding:14px;
        border-radius:12px;
        background:#0e1420;
        border:1px solid #2a3246;
        font-size:15px;
    }

    .big{
        font-size:22px;
        font-weight:700;
        display:block;
        margin-top:6px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>🧵 Filament Rechner</h1>

    <div class="card">

        <label>Rollen-Gewicht (Standard)</label>
        <select id="preset" class="highlight" onchange="setPreset()">
            <option value="1">1 kg (Standard)</option>
            <option value="0.5">0.5 kg</option>
            <option value="2">2 kg</option>
            <option value="3">3 kg</option>
        </select>

        <label>Außendurchmesser (inkl. Filament, außen gemessen) (cm)</label>
        <input id="outer" type="number" step="0.1" oninput="calc()">

        <label>Innendurchmesser Hülse (cm)</label>
        <input id="inner" type="number" step="0.1" oninput="calc()">

        <label>Rollenbreite (cm)</label>
        <input id="width" type="number" step="0.1" oninput="calc()">

        <label>Filamentdurchmesser</label>
        <select id="filament" onchange="calc()">
            <option value="1.75">1.75 mm</option>
            <option value="2.85">2.85 mm</option>
        </select>

        <label>Material</label>
        <select id="material" onchange="calc()">
            <option value="1.24">PLA</option>
            <option value="1.27">PETG</option>
        </select>

        <button onclick="calc()">Berechnen</button>

        <div class="result" id="result">Länge wird berechnet …</div>

    </div>

</div>

<script>

function setPreset(){

    const val = parseFloat(document.getElementById("preset").value);

    // nur Innen & Breite setzen, Außen bleibt leer!
    if(val === 0.5) setValues(5, 5.5);
    if(val === 1)   setValues(5.5, 6);
    if(val === 2)   setValues(6, 7);
    if(val === 3)   setValues(6.5, 8);

    calc();
}

function setValues(inner, width){
    document.getElementById("inner").value = inner;
    document.getElementById("width").value = width;
}

function calc(){

    const inner = parseFloat(document.getElementById("inner").value);
    const outer = parseFloat(document.getElementById("outer").value);
    const width = parseFloat(document.getElementById("width").value);
    const filament = parseFloat(document.getElementById("filament").value);
    const density = parseFloat(document.getElementById("material").value);

    // Außen MUSS manuell sein
    if(!inner || !outer || !width || !filament) return;

    const r1 = inner/2;
    const r2 = outer/2;

    const volume = Math.PI * (r2*r2 - r1*r1) * width;

    const mass = volume * density / 1000;

    const radiusF = (filament/10)/2;
    const areaF = Math.PI * radiusF * radiusF;

    const lengthCm = (mass*1000/density) / areaF;
    const meters = lengthCm / 100;

    document.getElementById("result").innerHTML = `
        📏 Länge:<span class="big">${meters.toFixed(0)} m</span>
        ⚖️ Gewicht: <b>${mass.toFixed(2)} kg</b>
    `;
}

setPreset();

</script>

</body>
</html>
